[pytest]
# Run complet — requereix Qdrant + Ollama actius
asyncio_mode = auto

markers =
    unit: Unit tests (fast, mocked dependencies)
    integration: Integration tests (require real services like Ollama)
    e2e: End-to-end tests (full system, slow)
    slow: Slow tests (skip with -m "not slow")
    gpu: Tests that require a GPU backend (Ollama, MLX or llama.cpp)

addopts = -v --tb=short --cov --cov-report=term-missing

testpaths =
    core
    memory
    personality
    plugins
    tests

python_files = test_*.py
python_classes = Test*
python_functions = test_*

filterwarnings =
    ignore::DeprecationWarning:pydantic.*
    ignore::DeprecationWarning:qdrant_client.*
    ignore::UserWarning:sentence_transformers.*
    ignore::DeprecationWarning
    ignore::builtins.DeprecationWarning
