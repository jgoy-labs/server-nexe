name: CI

on:
  push:
    branches: [main, pre-production]
    paths-ignore:
      - ".github/badges/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - ".github/badges/**"

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit (CVE scan)
        run: pip-audit --requirement requirements.txt

  tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: security-audit
    # contents: read only — badge commit is handled by the separate 'badge' job
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests (with coverage)
        env:
          NEXE_ENV: testing
          # Non-secret dummy values for CI. Override via GitHub Secrets if desired:
          # Settings → Secrets → Actions → NEXE_CI_API_KEY / NEXE_CI_CSRF_SECRET
          NEXE_PRIMARY_API_KEY: ${{ secrets.NEXE_CI_API_KEY || 'nexe-ci-test-key' }}
          NEXE_CSRF_SECRET: ${{ secrets.NEXE_CI_CSRF_SECRET || 'nexe-ci-csrf-secret' }}
        run: >
          pytest core memory personality plugins
          -m "not integration and not e2e and not slow"
          --cov=core --cov=memory --cov=personality --cov=plugins
          --cov-report=term
          --cov-report=xml:coverage.xml
          --tb=short -q

      - name: Coverage summary
        if: always()
        run: |
          python - <<'PY'
          import os
          import pathlib
          import xml.etree.ElementTree as ET

          path = pathlib.Path("coverage.xml")
          if not path.exists():
            print("coverage.xml not found")
            raise SystemExit(0)

          root = ET.parse(path).getroot()
          line_rate = float(root.attrib.get("line-rate", "0") or 0)
          lines_covered = int(root.attrib.get("lines-covered", "0") or 0)
          lines_valid = int(root.attrib.get("lines-valid", "0") or 0)

          summary = f"Total line coverage: {line_rate * 100:.1f}% ({lines_covered}/{lines_valid})"
          print(summary)

          out = os.environ.get("GITHUB_STEP_SUMMARY")
          if out:
            with open(out, "a", encoding="utf-8") as f:
              f.write("## Coverage\\n\\n")
              f.write(summary + "\\n")
          PY

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  precompute-check:
    name: Precomputed KB Manifest
    runs-on: ubuntu-latest
    needs: security-audit
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate precomputed manifest (bug #16)
        # Fast validation: does not regenerate vectors (would require
        # downloading ~1 GB of model weights per CI run). Verifies that
        # manifest.json is syntactically valid and that every source
        # hash listed in it still matches the corresponding file on
        # disk. MD edits, chunker/ingest source edits, and fastembed
        # version bumps will all trigger a failure here so the repo
        # cannot merge with a stale precomputed artefact set.
        #
        # continue-on-error: small knowledge edits between DMG builds
        # must not block CI. Authoritative check runs locally
        # (`scripts/precompute_kb.py --verify`) and at DMG build time
        # (ship-nexe.sh), where stale embeddings must be regenerated
        # before notarisation.
        continue-on-error: true
        run: |
          if [ -f knowledge/.embeddings/manifest.json ]; then
            python scripts/precompute_kb.py --verify
          else
            echo "No precomputed manifest yet; runtime fallback active."
          fi

  badge:
    name: Update Coverage Badge
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # contents: write isolated here — only this job needs to commit
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml

      - name: Generate coverage badge
        run: python .github/scripts/generate_coverage_badge.py coverage.xml .github/badges/coverage.svg

      - name: Commit coverage badge
        continue-on-error: true
        run: |
          set -euo pipefail

          if git diff --quiet -- .github/badges/coverage.svg; then
            echo "Coverage badge unchanged"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .github/badges/coverage.svg
          git commit -m "chore: update coverage badge"
          git push
