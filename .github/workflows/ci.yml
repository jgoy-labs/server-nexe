name: CI

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Security audit (dependencies)
        run: |
          pip-audit --requirement requirements.txt --desc on

      - name: Run tests (unit only) with coverage
        env:
          NEXE_ENV: test
          NEXE_LOG_LEVEL: WARNING
          NEXE_DEV_MODE: "false"
        run: |
          pytest -m "not integration and not e2e and not slow" \
            --cov=core/contracts \
            --cov=memory/embeddings \
            --cov=plugins/security/sanitizer \
            --cov=plugins/security_logger \
            --cov=personality/metrics \
            --cov-report=term-missing \
            --cov-config=.coveragerc \
            --cov-fail-under=90
