name: CI

on:
  push:
    branches: [main, pre-production]
  pull_request:
    branches: [main]

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit (CVE scan)
        run: pip-audit --requirement requirements.txt

  tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: security-audit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests (with coverage)
        env:
          NEXE_ENV: testing
          NEXE_PRIMARY_API_KEY: test-key-for-ci
          NEXE_CSRF_SECRET: test-csrf-secret-for-ci
        run: >
          pytest core memory personality plugins
          -m "not integration and not e2e and not slow"
          --cov=core --cov=memory --cov=personality --cov=plugins
          --cov-report=term
          --cov-report=xml:coverage.xml
          --tb=short -q

      - name: Coverage summary
        if: always()
        run: |
          python - <<'PY'
          import os
          import pathlib
          import xml.etree.ElementTree as ET

          path = pathlib.Path("coverage.xml")
          if not path.exists():
            print("coverage.xml not found")
            raise SystemExit(0)

          root = ET.parse(path).getroot()
          line_rate = float(root.attrib.get("line-rate", "0") or 0)
          lines_covered = int(root.attrib.get("lines-covered", "0") or 0)
          lines_valid = int(root.attrib.get("lines-valid", "0") or 0)

          summary = f"Total line coverage: {line_rate * 100:.1f}% ({lines_covered}/{lines_valid})"
          print(summary)

          out = os.environ.get("GITHUB_STEP_SUMMARY")
          if out:
            with open(out, "a", encoding="utf-8") as f:
              f.write("## Coverage\\n\\n")
              f.write(summary + "\\n")
          PY

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
