name: CI

on:
  push:
    branches: [main, pre-production]
  pull_request:
    branches: [main]

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit (CVE scan)
        run: pip-audit --requirement requirements.txt

  tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: security-audit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests (with coverage)
        env:
          NEXE_ENV: testing
          NEXE_PRIMARY_API_KEY: test-key-for-ci
          NEXE_CSRF_SECRET: test-csrf-secret-for-ci
        run: >
          pytest core memory personality plugins
          -m "not integration and not e2e and not slow"
          --cov=core --cov=memory --cov=personality --cov=plugins
          --cov-report=term
          --cov-report=xml:coverage.xml
          --tb=short -q

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
