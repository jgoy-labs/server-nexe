# ─────────────────────────────────────────────────────────────
# ModuleID: security
# Nexe v0.8.2 | Antigravity | 2026-03-25
# server-nexe/plugins/security/manifest.toml
# ─────────────────────────────────────────────────────────────

# ───────────────────────────────────────────
# [module] — Metadades principals
# ───────────────────────────────────────────

[module]
name = "security"
version = "0.8.2"
type = "core"
description = "Security core: auth dual-key, rate limiting, injection detection (XSS/SQL/NoSQL/command/path/LDAP), scanning, sanitizer"
location = "plugins/security/"
permanent = true
note = "Modul de seguretat integral amb submoduls sanitizer i security_logger"

# ───────────────────────────────────────────
# [module.metadata] — Autoria i dates
# ───────────────────────────────────────────

[module.metadata]
author = "Jordi Goy"
created = "2025-10-27"
last_updated = "2026-03-25"
status = "active"

# ───────────────────────────────────────────
# [module.capabilities] — Que pot fer
# ───────────────────────────────────────────

[module.capabilities]
has_api = true
has_ui = true
has_specialist = true
has_tests = true
streaming = false
real_time = false

# ───────────────────────────────────────────
# [module.dependencies] — De que depen
# ───────────────────────────────────────────

[module.dependencies]
modules = []
specialists = []
external_services = []

# ───────────────────────────────────────────
# [module.endpoints] — Rutes HTTP
# ───────────────────────────────────────────

[module.endpoints]
router_prefix = "/security"
public_routes = ["/health", "/info", "/ui", "/ui/assets/{path:path}"]
protected_routes = ["/scan", "/report"]

# ───────────────────────────────────────────
# [module.entry] — Com es carrega el plugin
# ───────────────────────────────────────────

[module.entry]
module = "plugins.security.module"
class = "SecurityModule"

# ───────────────────────────────────────────
# [module.router] — Router FastAPI
# ───────────────────────────────────────────

[module.router]
prefix = "/security"

# ───────────────────────────────────────────
# [module.integration] — Workflow, UI control center
# ───────────────────────────────────────────

[module.integration]
workflow_engine = false
ui_control_center = true

# ───────────────────────────────────────────
# [module.i18n] — Internacionalitzacio
# ───────────────────────────────────────────

[module.i18n]
default_locale = "ca-ES"
supported_locales = ["ca-ES", "es-ES", "en-US"]
translations_path = "languages/"

# ───────────────────────────────────────────
# [module.ui] — Interficie web
# ───────────────────────────────────────────

[module.ui]
framework = "vanilla-js"
theme_support = true
responsive = true
dark_mode = true
main_entry = "ui/index.html"

# ───────────────────────────────────────────
# [module.security] — Config seguretat propia
# ───────────────────────────────────────────

[module.security]
uses_api_key = true
path_validation = true
rate_limiting = true
auth_dependency = "plugins.security.core.auth.require_api_key"
scan_limit = "2/minute"
report_limit = "10/minute"

# ───────────────────────────────────────────
# [module.storage] — Paths a disc
# ───────────────────────────────────────────

[module.storage]

[[module.storage.paths]]
path = "storage/system-logs/security"
type = "security_logs"
format = "json"
retention_days = 90
action = "ARCHIVE"
archive_to = "storage/archives/security/{year}-{month}/"
auto_clean = false
description = "Security logs - compliance 90 dies"

[module.storage.protection]
protected_patterns = ["*.db", "api_keys.json", "*.key"]
