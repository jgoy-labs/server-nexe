manifest_version = "1.0"

[module]
name = "security"
version = "0.2.0"
type = "module"
description = "Sistema de seguretat integral amb scanning, detecció de vulnerabilitats, autenticació API key, rate limiting i checks automatitzats per validar la seguretat del sistema Nexe"
enabled = true
auto_start = false
priority = 10
author = "Nexe Team (Jordi Goy)"

[capabilities]
has_api = true
has_ui = true
has_cli = false
has_tests = true
streaming = false
real_time = false

[dependencies]
modules = []
optional_modules = [ "observability",]
external_services = []
python_packages = []

[api]
enabled = true
prefix = "/security"
tags = []
public_routes = [ "/", "/health", "/info", "/ui", "/ui/assets/{path:path}", "/ui/js/{path:path}",]
protected_routes = [ "/scan", "/report",]
admin_routes = []
rate_limit = "2/minute"

[ui]
enabled = true
path = "ui"
main_file = "ui/index.html"
framework = "vanilla-js"
theme_support = true
responsive = true
route = "/security/ui"

[i18n]
default_locale = "ca-ES"
supported_locales = [ "ca-ES", "es-ES", "en-US",]
translations_path = "languages/"

[storage]
[[storage.paths]]
path = "storage/system-logs/security"
type = "security_logs"
format = "json"
retention_days = 90
action = "ARCHIVE"
archive_to = "storage/archives/security/{year}-{month}/"
description = "Security logs - compliance 90 dies"
auto_clean = false

[capabilities.custom]
has_specialist = true
has_workflow = false
has_cli_scripts = false
security_scanning = true
vulnerability_detection = true
authentication = true
api_key_management = true
rate_limiting = true
automated_checks = true
security_reporting = true

[storage.protection]
protected_patterns = [ "*.db", "api_keys.json", "*.key",]

[metadata.authentication]
enabled = true
method = "api_key"
header = "X-API-Key"
auth_module = "core.security.core.auth"
function = "require_api_key"

[metadata.rate_limiting]
enabled = true
scan_limit = "2/minute"
report_limit = "10/minute"
provider = "nexe.core.dependencies.limiter"

[metadata.severity_levels]
levels = [ "CRITICAL", "HIGH", "MEDIUM", "LOW", "INFO",]
alert_on = [ "CRITICAL", "HIGH",]

[metadata._migration]
migrated_at = "2026-02-05T15:47:16.926613"
migrated_by = "ManifestMigrator v1.0"
original_format = "security_format"
