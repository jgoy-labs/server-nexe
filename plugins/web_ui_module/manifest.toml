# ─────────────────────────────────────────────────────────────
# ModuleID: web_ui_module
# Nexe v0.9.0 | Web UI Demo Plugin | 2026-01-11
# server-nexe/plugins/web_ui_module/manifest.toml
# ─────────────────────────────────────────────────────────────

[module]
name = "web_ui_module"
version = "0.9.1"
type = "web_interface"
description = "Interfície web estil Ollama per demostrar el sistema modular de Nexe. Inclou xat amb streaming, sessions i upload de documents."
location = "plugins/web_ui_module/"
permanent = false
note = "Plugin de demostració del sistema modular"

[module.metadata]
author = "Jordi Goy"
created = "2026-01-11"
last_updated = "2026-01-11"
status = "active"

[module.capabilities]
has_api = true
has_ui = true
has_specialist = false
has_tests = false
streaming = true
real_time = true
file_upload = true
session_management = true

[module.dependencies]
modules = ["security"]
specialists = []
external_services = []

[module.endpoints]
router_prefix = "/ui"
public_routes = ["/", "/static/*"]
protected_routes = ["/chat", "/upload", "/sessions"]

[module.entry]
module = "plugins.web_ui_module.module"
class = "WebUIModule"

[module.router]
prefix = "/ui"
