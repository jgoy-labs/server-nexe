<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexe - Local AI</title>
    <link rel="icon" type="image/svg+xml" href="/ui/static/favicon.svg">
    <link rel="apple-touch-icon" href="/ui/static/favicon.svg">
    <link rel="stylesheet" href="/ui/static/style.css">
    <script src="/ui/static/app-init.js"></script>
    <script src="/ui/static/lucide.min.js"></script>
    <!-- Marked.js for Markdown rendering (local) -->
    <script src="/ui/static/marked.min.js"></script>
</head>
<style>
    .login-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #0a0a0a; display: none; align-items: center;
        justify-content: center; z-index: 9999;
    }
    .login-box {
        background: #120808; border: 1px solid #3a1010; border-radius: 6px;
        padding: 2.5rem; text-align: center; min-width: 320px; max-width: 380px; width: 90%;
    }
    .login-box h2 {
        color: #e62020; margin: 0 0 0.35rem;
        font-size: 1.6rem; font-family: 'JetBrains Mono', monospace;
        font-weight: 700; letter-spacing: -0.02em;
    }
    .login-box .login-subtitle { color: #666; margin: 0 0 2rem; font-size: 0.8rem; font-family: 'JetBrains Mono', monospace; }
    .login-box input {
        width: 100%; padding: 0.75rem 1rem; background: #0a0a0a;
        border: 1px solid #2a1010; border-radius: 4px; color: #fff;
        font-size: 0.9rem; margin-bottom: 1rem; box-sizing: border-box;
        font-family: 'JetBrains Mono', monospace;
        transition: border-color 0.2s;
    }
    .login-box input:focus { outline: none; border-color: #e62020; }
    .login-box button {
        width: 100%; padding: 0.75rem; background: #e62020; border: none;
        border-radius: 4px; color: #0a0a0a; font-size: 0.85rem; cursor: pointer;
        font-family: 'JetBrains Mono', monospace; font-weight: 700;
        text-transform: uppercase; letter-spacing: 0.08em;
        transition: background 0.2s;
    }
    .login-box button:hover { background: #cc0000; }
    .login-error { color: #ff4444; font-size: 0.8rem; margin-top: 0.75rem; display: none; font-family: 'JetBrains Mono', monospace; }
    .login-hint { color: #444; font-size: 0.75rem; margin-top: 1rem; font-family: 'JetBrains Mono', monospace; }
    .login-hint code { color: #666; background: #0a0a0a; padding: 0.1rem 0.3rem; border-radius: 3px; border: 1px solid #2a1010; }
</style>
<body>
    <!-- Animated frame -->
    <div class="frame-border frame-top"></div>
    <div class="frame-border frame-bottom"></div>
    <div class="frame-border frame-left"></div>
    <div class="frame-border frame-right"></div>

    <!-- Login Overlay -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <h2>Nexe</h2>
            <p class="login-subtitle"></p>
            <input type="password" id="apiKeyInput" placeholder="API Key..." autocomplete="off" spellcheck="false">
            <button id="loginBtn"></button>
            <p id="loginError" class="login-error"></p>
            <p class="login-hint"></p>
        </div>
    </div>
    <div id="readinessOverlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;display:flex;align-items:center;justify-content:center;z-index:9998;flex-direction:column;gap:12px;">
        <img src="/ui/static/logo.svg" alt="nexe" style="width:48px;height:48px;opacity:0.6;">
        <span style="color:#888;font-size:14px;font-family:system-ui,sans-serif;" id="readinessText"></span>
    </div>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <img src="/ui/static/logo.png" alt="server.nexe" class="logo-img">
                    <div class="header-actions">
                        <button id="themeToggleBtn" class="theme-toggle" title="Toggle theme">
                            <span class="toggle-track">
                                <i data-lucide="sun" class="toggle-icon icon-sun"></i>
                                <i data-lucide="moon" class="toggle-icon icon-moon"></i>
                            </span>
                        </button>
                        <button id="frameToggleBtn" class="btn-frame-toggle" title="Show/hide frame">◼</button>
                        <button id="sidebarToggleBtn" class="btn-sidebar-toggle" title="Toggle sidebar">
                            <i data-lucide="panel-left-close"></i>
                        </button>
                    </div>
                </div>
                <div id="modelInfo" class="model-info">
                    <div class="model-info-dot"></div>
                    <span class="model-info-text" id="modelInfoText"></span>
                </div>
                <div class="backend-selector-control">
                    <div class="backend-selector-label">
                        <span class="backend-selector-title"></span>
                    </div>
                    <select id="backendSelect" class="backend-select">
                        <option value=""></option>
                    </select>
                    <div class="backend-selector-label" style="margin-top: 6px;">
                        <span class="backend-selector-title"></span>
                    </div>
                    <select id="modelSelect" class="backend-select">
                        <option value=""></option>
                    </select>
                </div>
                <div class="rag-threshold-control">
                    <div class="rag-threshold-label">
                        <span class="rag-threshold-title">
                            <span class="rag-info-toggle" id="ragInfoToggle">ⓘ</span>
                        </span>
                        <span id="ragThresholdValue" class="rag-threshold-badge">0.25</span>
                    </div>
                    <div id="ragInfoPanel" class="rag-info-panel" style="display:none">
                    </div>
                    <input type="range" id="ragThresholdSlider" class="rag-threshold-slider"
                           min="0.20" max="0.70" step="0.05" value="0.25">
                    <div class="rag-threshold-hints">
                        <span></span><span></span>
                    </div>
                </div>

                <div class="collection-control">
                    <div class="collection-label">
                        <span class="collection-title"></span>
                    </div>
                    <label class="collection-check">
                        <input type="checkbox" id="colMemory" checked>
                        <i data-lucide="brain" class="collection-icon"></i>
                        <span class="collection-name" data-i18n="col_memory"></span>
                        <span class="rag-info-toggle col-info-toggle" id="colMemoryInfo" title="">ⓘ</span>
                    </label>
                    <label class="collection-check">
                        <input type="checkbox" id="colKnowledge" checked>
                        <i data-lucide="book-open" class="collection-icon"></i>
                        <span class="collection-name" data-i18n="col_knowledge"></span>
                        <span class="rag-info-toggle col-info-toggle" id="colKnowledgeInfo" title="">ⓘ</span>
                    </label>
                    <label class="collection-check">
                        <input type="checkbox" id="colDocs" checked>
                        <i data-lucide="file-text" class="collection-icon"></i>
                        <span class="collection-name" data-i18n="col_docs"></span>
                        <span class="rag-info-toggle col-info-toggle" id="colDocsInfo" title="">ⓘ</span>
                    </label>
                    <div id="collectionWarning" class="collection-warning" style="display:none"></div>
                </div>
            </div>

            <div class="sidebar-content">
                <button id="newChatBtn" class="btn-new-chat">
                    <i data-lucide="plus"></i>
                </button>

                <div class="sessions-header">
                    <h3></h3>
                </div>

                <div id="sessionsList" class="sessions-list">
                    <!-- Sessions populated dynamically -->
                </div>
            </div>

        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <div id="chatMessages" class="chat-messages">
                <!-- Welcome screen: populated by showWelcome() with i18n -->
            </div>

            <!-- Input Area -->
            <div class="chat-input-area">
                <div class="input-container">
                    <button id="uploadBtn" class="btn-upload" title="Upload document">
                        <i data-lucide="paperclip"></i>
                    </button>
                    <button id="imageBtn" class="btn-upload" title="Attach image (VLM)" style="position:relative;">
                        <i data-lucide="camera"></i>
                        <span id="imageBadge" style="display:none;position:absolute;top:2px;right:2px;
                              width:7px;height:7px;background:#e62020;border-radius:50%;"></span>
                    </button>

                    <textarea
                        id="messageInput"
                        placeholder=""
                        rows="1"
                    ></textarea>

                    <button id="sendBtn" class="btn-send" title="Send">
                        <i data-lucide="send"></i>
                    </button>
                    <button id="stopBtn" class="btn-stop" title="Stop generation" style="display: none;">
                        <i data-lucide="square"></i>
                    </button>
                </div>
                <!-- Image preview strip (hidden per defecte) -->
                <div id="imagePreviewBar" style="display:none;padding:4px 8px;
                     background:#1a0808;border:1px solid #3a1010;border-radius:0.5rem;
                     align-items:center;gap:8px;margin-top:0.5rem;
                     max-width:900px;margin-left:auto;margin-right:auto;">
                    <img id="imagePreviewThumb" alt="preview"
                         style="height:40px;width:auto;border-radius:3px;border:1px solid #3a1010;">
                    <span id="imagePreviewName" style="color:#888;font-size:0.75rem;
                          font-family:'JetBrains Mono',monospace;flex:1;overflow:hidden;
                          text-overflow:ellipsis;white-space:nowrap;"></span>
                    <button id="imageClearBtn" style="background:none;border:none;color:#e62020;
                            cursor:pointer;font-size:1rem;padding:0 4px;" title="Remove image">✕</button>
                </div>
                <input type="file" id="fileInput" accept=".txt,.md,.markdown,.pdf,image/jpeg,image/png,image/webp" style="display: none">
                <input type="file" id="imageInput" accept="image/jpeg,image/png,image/webp" style="display: none">
                <div id="statsBar" class="stats-bar">
                    <div class="stats-item">
                        <span class="stats-label">tok</span>
                        <span class="stats-value" id="statTokens">0</span>
                    </div>
                    <div class="stats-item">
                        <span class="stats-value" id="statSpeed">0</span>
                        <span class="stats-label">tok/s</span>
                    </div>
                </div>
                <div id="filePreview" class="file-preview"></div>
            </div>
        </main>
    </div>

    <!-- Full-width global footer -->
    <footer class="site-footer">
        <div class="footer-left">
            <span class="footer-text">© 2026 Barcelona v0.9</span>
        </div>
        <div class="footer-center">
            <a href="https://server-nexe.com" target="_blank" class="footer-link">server-nexe.com</a>
            <span class="footer-separator">·</span>
            <a href="https://server-nexe.org" target="_blank" class="footer-link">Docs</a>
            <span class="footer-separator">·</span>
            <a href="https://github.com/jgoy-labs/server-nexe" target="_blank" class="footer-link">GitHub</a>
            <span class="footer-separator">·</span>
            <a href="https://jgoy.net" target="_blank" class="footer-link">jgoy.net</a>
            <span class="footer-separator">·</span>
            <a href="https://server-nexe.com/#support" target="_blank" class="footer-link footer-support">
                <i data-lucide="heart"></i>
            </a>
        </div>
        <div class="footer-right">
            <select id="langSelect" class="lang-select" title="Language">
                <option value="en">EN</option>
                <option value="ca">CA</option>
                <option value="es">ES</option>
            </select>
            <div id="thinkingBadge" class="thinking-badge">
                <div class="thinking-dots"><span></span><span></span><span></span></div>
                <span></span>
            </div>
            <div class="status-indicator">
                <div class="status-dot active"></div>
                <span></span>
            </div>
        </div>
    </footer>

    <script src="/ui/static/app.js"></script>
</body>
</html>
