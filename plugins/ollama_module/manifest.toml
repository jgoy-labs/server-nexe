# ─────────────────────────────────────────────────────────────
# ModuleID: {{NEXE_MODULE_ID}}
# Nexe v0.7.1 | J.Goy | 2025-10-23
# server.nexe/plugins/ollama_module/manifest.toml
#
# Descripció:
# Manifest operatiu del mòdul Ollama. Utilitzat pel ModuleManager
# per identificar metadades, dependències i integracions.
# ─────────────────────────────────────────────────────────────

[module]
name = "ollama_module"
version = "0.5.0"
type = "local_llm_option"
description = "Integració amb Ollama per executar models LLM locals sense dependències de cloud. Gestió de models, streaming de respostes, embeddings locals i interfície d'administració completa"
location = "plugins/ollama_module/"
permanent = true
external_tool = "Ollama"
note = "Una de les moltes opcions de LLM que Nexe suportarà"

[module.metadata]
author = "Nexe Team (Jordi Goy)"
created = "2025-10-22"
last_updated = "2025-10-23"
status = "active"

[module.capabilities]
has_api = true
has_ui = true
has_specialist = true
has_tests = true
streaming = true
real_time = true

[module.dependencies]
modules = []
specialists = ["ollama_specialist"]
external_services = ["Ollama (configurable host)"]

[module.endpoints]
router_prefix = "/ollama"
ui_path = "/ollama/ui"
public_routes = ["/", "/assets/{path:path}", "/js/{path:path}", "/api/models", "/health", "/info"]
protected_routes = ["/api/pull", "/api/chat", "/api/models/{name}"]

[module.cli]
command_name = "ollama"
alias = "ollama"
entry_point = "nexe.tools.ollama_module.cli"
description = "Gestió de models LLM locals amb Ollama"
commands = ["status", "models", "pull", "info", "delete", "chat", "ask"]
framework = "typer"
offline = false
quadrant = "nexe"

[module.integration]
workflow_engine = true
workflow_node = "nexe.tools.ollama_module.workflow.nodes.ollama_node.OllamaNode"
ui_control_center = true

