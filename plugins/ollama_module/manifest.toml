manifest_version = "1.0"

[module]
name = "ollama_module"
version = "0.5.0"
type = "module"
description = "i18n:ollama_module.manifest.description|Integration with Ollama to run local LLMs without cloud dependencies. Model management, response streaming, local embeddings, and a full admin UI."
enabled = true
auto_start = false
priority = 10
author = "Nexe Team (Jordi Goy)"

[capabilities]
has_api = true
has_ui = true
has_cli = true
has_tests = true
streaming = true
real_time = true

[dependencies]
modules = []
optional_modules = []
external_services = [ "Ollama (configurable host)",]
python_packages = []

[api]
enabled = true
prefix = "/ollama"
tags = []
public_routes = [ "/", "/assets/{path:path}", "/js/{path:path}", "/api/models", "/health", "/info",]
protected_routes = [ "/api/pull", "/api/chat", "/api/models/{name}",]
admin_routes = []

[ui]
enabled = true
path = "ui"
main_file = "index.html"
framework = "vanilla-js"
theme_support = true
responsive = true
route = "/ollama/ui"

[cli]
enabled = true
command_name = "ollama"
entry_point = "nexe.tools.ollama_module.cli"
description = "i18n:ollama_module.manifest.cli_description|Manage local LLM models with Ollama"
commands = [ "status", "models", "pull", "info", "delete", "chat", "ask",]
framework = "typer"

[metadata]
original_created = "2025-10-22"
original_last_updated = "2025-10-23"
original_status = "active"

[capabilities.custom]
has_specialist = true

[metadata._migration]
migrated_at = "2026-02-05T15:47:16.928337"
migrated_by = "ManifestMigrator v1.0"
original_format = "ollama_format"
