<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ollama Module — Server Nexe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; background: #0a0a0a; color: #e0e0e0; padding: 2rem; }
    h1 { color: #4fc3f7; margin-bottom: 0.5rem; font-size: 1.5rem; }
    h2 { color: #888; font-size: 0.9rem; font-weight: normal; margin-bottom: 2rem; }
    .card { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
    .card h3 { color: #ccc; font-size: 1rem; margin-bottom: 1rem; }
    .status { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
    .status.healthy, .status.HEALTHY { background: #1a3a1a; color: #4caf50; }
    .status.unhealthy, .status.UNHEALTHY { background: #3a1a1a; color: #f44336; }
    .status.unknown { background: #2a2a2a; color: #888; }
    .info-grid { display: grid; grid-template-columns: auto 1fr; gap: 0.3rem 1rem; font-size: 0.85rem; }
    .info-grid dt { color: #888; } .info-grid dd { color: #e0e0e0; }
    .model-list { list-style: none; font-size: 0.85rem; }
    .model-list li { padding: 0.3rem 0; border-bottom: 1px solid #222; }
    #error { color: #f44336; display: none; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>Ollama Module</h1>
  <h2>Server Nexe — Status Page</h2>
  <div class="card"><h3>Info</h3><dl class="info-grid" id="info-grid"><dt>Status</dt><dd>Loading...</dd></dl></div>
  <div class="card"><h3>Health</h3><div id="health-status"><span class="status unknown">loading</span></div></div>
  <div class="card"><h3>Models</h3><ul class="model-list" id="model-list"><li>Loading...</li></ul></div>
  <div id="error"></div>
  <script src="assets/js/status.js"></script>
</body>
</html>
