[module]
name = "mlx_module"
version = "0.8.2"
type = "local_llm_option"
description = "Motor d'inferència ultra-optimitzat per a Apple Silicon (M1/M2/M3/M4) usant MLX. Inclou prefix matching real amb TTFT instantani en converses llargues."
location = "plugins/mlx_module/"
permanent = true
external_tool = "mlx-lm"
note = "Màxim rendiment en hardware Apple"

[module.metadata]
author = "Jordi Goy"
created = "2026-01-02"
last_updated = "2026-01-02"
status = "active"

[module.capabilities]
has_api = true
has_ui = false
has_specialist = true
has_tests = true
streaming = true
real_time = true
prefix_caching = true

[module.dependencies]
modules = []
specialists = []
external_services = []

[module.endpoints]
router_prefix = "/mlx"
public_routes = ["/health", "/info"]
protected_routes = ["/chat"]

[module.entry]
module = "plugins.mlx_module.module"
class = "MLXModule"

[module.router]
prefix = "/mlx"
