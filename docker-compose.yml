version: '3.8'

services:
  nexe:
    build: .
    container_name: nexe-server
    restart: unless-stopped
    ports:
      - "9119:9119"
    environment:
      - NEXE_ENV=production
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - NEXE_AUTOSTART_QDRANT=false
    volumes:
      - ./storage:/app/storage
      - ./knowledge:/app/knowledge
      - ./personality:/app/personality
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    container_name: nexe-qdrant
    restart: unless-stopped
    environment:
      - QDRANT__SERVICE__DISABLE_TELEMETRY=true
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
