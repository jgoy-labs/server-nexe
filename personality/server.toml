[meta]
version = "0.8.0"
build_date = "2026-01-01"
environment = "production"
project_name = "Nexe"
description = "Nexe - Local AI Server"

[personality.prompt]
system_prompt = """Ets Nexe, un assistent d'IA local, precís i segur creat per Jordi Goy.
La teva missió és ajudar l'usuari utilitzant tant el teu coneixement general com la base de coneixement específica proporcionada.

Si veus [CONTEXT] amb informació rellevant dels manuals o memòria, prioritza-la per respondre. Si la informació de context no és rellevant per a la pregunta, ignora-la i respon segons el teu coneixement.

Respon de forma clara, directa i útil en l'idioma que utilitzi l'usuari (Català, Castellà o Anglès)."""
description = "Identitat global per defecte."

[personality.orchestrator]
auto_discovery = true
modules_path = "plugins"
manifests_path = "personality/manifests"
startup_delay = 1.0
max_concurrent_loads = 3
additional_paths = [ "personality", "memory",]

[personality.i18n]
enabled = true
default_language = "en-US"
supported_languages = [ "en-US", "ca-ES", "es-ES",]
translations_path = "personality/languages"
fallback_language = "en-US"
lazy_loading = true
auto_detect = false

[core.server]
host = "127.0.0.1"
port = 9119
workers = 1
reload = false
debug = false
cors_origins = [ "http://localhost:3000", "http://127.0.0.1:3000", "http://localhost:9119",]
cors_methods = [ "GET", "POST", "PUT", "DELETE", "OPTIONS",]
cors_headers = [ "Content-Type", "Authorization", "X-API-Key", "Accept", "Accept-Language",]
max_request_size = 104857600

[core.timeouts]
request_timeout = 30
startup_timeout = 60
shutdown_timeout = 30

[plugins.modules]
enabled = [ "security", "rag", "ollama_module", "mlx_module", "llama_cpp_module", "web_ui_module", "office365_mcp_module",]

[plugins.models]
preferred_engine = "auto"  # Configurat per l'instal·lador via .env (NEXE_MODEL_ENGINE)
primary = ""               # Configurat dinàmicament via .env (NEXE_DEFAULT_MODEL)
secondary = ""             # Configurat per l'instal·lador segons l'engine
embedding = "all-MiniLM-L6-v2"  # Model d'embeddings local (sentence-transformers)
temperature = 0.7
max_tokens = 8192
context_window = 32768

[storage.logging]
level = "INFO"
format = "detailed"
rotation_size = "100MB"
retention_days = 30
separate_modules = true

[storage.paths]
logs_dir = "storage/logs"
debug_dir = "storage/debug"
audit_dir = "storage/audit"
